name: Deploy Blazor WebAssembly to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Sa1shanWebSite/Sa1shanWebSite.csproj

      - name: Publish website
        run: dotnet publish Sa1shanWebSite/Sa1shanWebSite.csproj --configuration Release --output release

      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v4